<!-- login.html -->
<div class="login-container">

  <p-card styleClass="login-card">

    <ng-template pTemplate="header">
      <div class="login-header">
        <h2>Iniciar Sesión</h2>
      </div>
    </ng-template>

    <form [formGroup]="loginForm" (ngSubmit)="login()" class="login-form">

      <!-- Email -->
      <div class="field-group">
        <label for="email">Correo electrónico</label>
        <div class="p-inputgroup input-row">
          <span class="p-inputgroup-addon"><i class="pi pi-envelope"></i></span>
          <input id="email" pInputText formControlName="email" placeholder="correo@ejemplo.com"
            [ngClass]="{'ng-invalid ng-dirty': email?.invalid && email?.touched}" />
        </div>
        <small class="p-error" *ngIf="email?.invalid && email?.touched">
          Correo inválido o vacío.
        </small>
      </div>

      <!-- Password -->
      <div class="field-group">
        <label for="password">Contraseña</label>
        <div class="password-wrapper input-row" [class.input-error]="password?.invalid && password?.touched">
          <span class="password-icon"><i class="pi pi-lock"></i></span>
          <p-password
            inputId="password"
            formControlName="password"
            placeholder="••••••••"
            [feedback]="false"
            [toggleMask]="true"
            styleClass="password-inner">
          </p-password>
        </div>
        <small class="p-error" *ngIf="password?.invalid && password?.touched">
          La contraseña es obligatoria.
        </small>
      </div>

      <p-message *ngIf="loginError" severity="error" text="Credenciales incorrectas." styleClass="w-full"></p-message>

      <!-- Botones centrados, mismo tamaño, sin ícono en Cancelar -->
      <div class="botones">
        <p-button label="Entrar"   type="submit" icon="pi pi-sign-in" styleClass="btn-entrar"   [loading]="isLoading"></p-button>
        <p-button label="Cancelar" routerLink="/"                     styleClass="btn-cancelar" [outlined]="true" icon="pi pi-times"></p-button>
      </div>

    </form>

    <ng-template pTemplate="footer">
      <div class="demo-box">
        <i class="pi pi-info-circle"></i>
        <span>admin@app.com · Admin@12345</span>
      </div>
    </ng-template>

  </p-card>

</div>
