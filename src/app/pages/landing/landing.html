<!-- home.html -->
<div class="home-card">

  <div class="home-header">
    <h2>Bienvenido a la App</h2>
  </div>

  <div class="home-body">
    <p>Inicia sesión o regístrate para continuar</p>

    <div class="home-botones">
      <p-button label="Login"    routerLink="/login"    icon="pi pi-sign-in" styleClass="btn-login"></p-button>
      <p-button label="Registro" routerLink="/register" icon="pi pi-user"    styleClass="btn-registro" [outlined]="true"></p-button>
    </div>
  </div>

</div>
