<div class="page-card">

  <div class="page-header">
    <h2>Usuario</h2>
  </div>

  <div class="page-body">

    <div class="profile-section">
      <div class="profile-info">
        <span class="profile-name">{{ user?.fullName }}</span>
        <span class="profile-email">{{ user?.email }}</span>
        <p-tag value="Activo" styleClass="profile-tag"></p-tag>
      </div>
    </div>

    <p-divider></p-divider>

    <div class="data-grid">

      <div class="data-item">
        <span class="data-label"><i class="pi pi-user"></i> Usuario</span>
        <span class="data-value">{{ user?.username }}</span>
      </div>

      <div class="data-item">
        <span class="data-label"><i class="pi pi-phone"></i> Teléfono</span>
        <span class="data-value">{{ user?.phone }}</span>
      </div>

      <div class="data-item">
        <span class="data-label"><i class="pi pi-map-marker"></i> Dirección</span>
        <span class="data-value">{{ user?.address }}</span>
      </div>

      <div class="data-item">
        <span class="data-label"><i class="pi pi-calendar"></i> Nacimiento</span>
        <span class="data-value">{{ user?.birthDate | date:'dd/MM/yyyy' }}</span>
      </div>

    </div>

    <div class="user-actions">
      <p-button label="Editar perfil" icon="pi pi-pencil" styleClass="btn-editar" (onClick)="openEdit()"></p-button>
    </div>

  </div>
</div>

<!-- Dialog editar -->
<p-dialog
  header="Editar perfil"
  [(visible)]="showDialog"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  styleClass="user-dialog"
  [style]="{ width: '420px' }">

  <div class="dialog-body">

    <div class="field">
      <label>Nombre completo</label>
      <input pInputText [(ngModel)]="editUser.fullName" placeholder="Nombre completo" />
    </div>

    <div class="field">
      <label>Usuario</label>
      <input pInputText [(ngModel)]="editUser.username" placeholder="Usuario" />
    </div>

    <div class="field">
      <label>Email</label>
      <input pInputText [(ngModel)]="editUser.email" placeholder="Email" />
    </div>

    <div class="field">
      <label>Teléfono</label>
      <input pInputText [(ngModel)]="editUser.phone" placeholder="Teléfono" />
    </div>

    <div class="field">
      <label>Dirección</label>
      <input pInputText [(ngModel)]="editUser.address" placeholder="Dirección" />
    </div>

    <div class="field">
      <label>Fecha de nacimiento</label>
      <input type="date" [(ngModel)]="birthDateString" class="date-input" />
    </div>

  </div>

  <ng-template pTemplate="footer">
    <p-button label="Cancelar" styleClass="btn-cancel" (onClick)="showDialog = false"></p-button>
    <p-button label="Guardar"  styleClass="btn-save"   (onClick)="save()"></p-button>
  </ng-template>

</p-dialog>
